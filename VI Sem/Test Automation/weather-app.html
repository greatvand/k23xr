<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 420px; }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 1.25rem;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input {
      flex: 1;
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      background: #fff;
      color: #111;
    }

    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

    button {
      padding: 10px 18px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.98); }

    .quick-cities {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1.25rem;
    }

    .chip {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      color: #374151;
    }

    .chip:hover { background: #f9fafb; border-color: #6366f1; color: #6366f1; }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      padding: 1.5rem;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .city { font-size: 22px; font-weight: 600; color: #111; }
    .country { font-size: 14px; color: #6b7280; margin-left: 6px; }
    .desc { font-size: 13px; color: #6b7280; margin-top: 3px; text-transform: capitalize; }

    .weather-icon { width: 56px; height: 56px; }

    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin: 1rem 0 1.25rem;
    }

    .temp { font-size: 52px; font-weight: 600; color: #111; line-height: 1; }
    .temp-unit { font-size: 22px; color: #9ca3af; }

    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 0 0 1.25rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      background: #f9fafb;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .stat-label {
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .stat-val { font-size: 18px; font-weight: 600; color: #111; }
    .stat-unit { font-size: 12px; color: #9ca3af; }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #b91c1c;
    }

    .loader {
      text-align: center;
      padding: 2rem;
      font-size: 14px;
      color: #6b7280;
    }

    .api-note {
      margin-top: 1rem;
      font-size: 11px;
      color: #d1d5db;
      font-family: monospace;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>Weather App</h1>

  <div class="search-row">
    <input type="text" id="cityInput" placeholder="Enter city name..."
      onkeydown="if(event.key==='Enter') fetchWeather()" />
    <button onclick="fetchWeather()">Search</button>
  </div>

  <div class="quick-cities">
    <span class="chip" onclick="setCity('Delhi')">Delhi</span>
    <span class="chip" onclick="setCity('London')">London</span>
    <span class="chip" onclick="setCity('New York')">New York</span>
    <span class="chip" onclick="setCity('Tokyo')">Tokyo</span>
    <span class="chip" onclick="setCity('Sydney')">Sydney</span>
  </div>

  <div id="loader" class="loader hidden">Fetching weather...</div>
  <div id="error" class="error hidden"></div>

  <div id="result" class="card hidden">
    <div class="card-top">
      <div>
        <div>
          <span class="city" id="r-city"></span>
          <span class="country" id="r-country"></span>
        </div>
        <div class="desc" id="r-desc"></div>
      </div>
      <svg class="weather-icon" id="r-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="temp-row">
      <span class="temp" id="r-temp"></span>
      <span class="temp-unit">°C</span>
    </div>

    <hr class="divider">

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Feels like</div>
        <div><span class="stat-val" id="r-feels"></span><span class="stat-unit"> °C</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div><span class="stat-val" id="r-humidity"></span><span class="stat-unit"> %</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div><span class="stat-val" id="r-wind"></span><span class="stat-unit"> m/s</span></div>
      </div>
    </div>

    <div class="api-note" id="r-url"></div>
  </div>
</div>

<script>
  const API_KEY = 'f9983b19e8d8d33467455777fe4a3ca9';
  const BASE    = 'https://api.openweathermap.org/data/2.5/weather';

  function setCity(name) {
    document.getElementById('cityInput').value = name;
    fetchWeather();
  }

  function getIcon(id) {
    if (id >= 200 && id < 300) return `
      <circle cx="28" cy="28" r="18" fill="#ede9fe"/>
      <line x1="22" y1="22" x2="26" y2="36" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="18" x2="34" y2="32" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>`;
    if (id >= 300 && id < 600) return `
      <ellipse cx="28" cy="22" rx="12" ry="10" fill="#bfdbfe"/>
      <rect x="14" y="28" width="28" height="9" rx="4.5" fill="#93c5fd"/>
      <line x1="22" y1="40" x2="20" y2="48" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
      <line x1="28" y1="40" x2="26" y2="48" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
      <line x1="34" y1="40" x2="32" y2="48" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>`;
    if (id >= 600 && id < 700) return `
      <ellipse cx="28" cy="22" rx="12" ry="10" fill="#e0e7ff"/>
      <rect x="14" y="28" width="28" height="9" rx="4.5" fill="#c7d2fe"/>
      <circle cx="22" cy="41" r="2.5" fill="#a5b4fc"/>
      <circle cx="28" cy="44" r="2.5" fill="#a5b4fc"/>
      <circle cx="34" cy="41" r="2.5" fill="#a5b4fc"/>`;
    if (id >= 700 && id < 800) return `
      <rect x="10" y="18" width="36" height="5" rx="2.5" fill="#d1d5db"/>
      <rect x="14" y="26" width="28" height="5" rx="2.5" fill="#9ca3af"/>
      <rect x="10" y="34" width="36" height="5" rx="2.5" fill="#d1d5db"/>`;
    if (id === 800) return `
      <circle cx="28" cy="28" r="14" fill="#fcd34d"/>
      <line x1="28" y1="5"  x2="28" y2="11" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="28" y1="45" x2="28" y2="51" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="5"  y1="28" x2="11" y2="28" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="45" y1="28" x2="51" y2="28" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="11" y1="11" x2="16" y2="16" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="40" y1="40" x2="45" y2="45" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="45" y1="11" x2="40" y2="16" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="16" y1="40" x2="11" y2="45" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>`;
    return `
      <circle cx="22" cy="26" r="12" fill="#fcd34d"/>
      <rect x="16" y="30" width="28" height="11" rx="5.5" fill="#d1d5db"/>`;
  }

  async function fetchWeather() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return;

    const loader = document.getElementById('loader');
    const error  = document.getElementById('error');
    const result = document.getElementById('result');

    loader.classList.remove('hidden');
    error.classList.add('hidden');
    result.classList.add('hidden');

    const url = `${BASE}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;

    try {
      const res  = await fetch(url);
      const data = await res.json();
      loader.classList.add('hidden');

      if (data.cod !== 200) {
        error.classList.remove('hidden');
        error.textContent = `Error ${data.cod}: ${data.message}`;
        return;
      }

      document.getElementById('r-city').textContent     = data.name;
      document.getElementById('r-country').textContent  = data.sys.country;
      document.getElementById('r-desc').textContent     = data.weather[0].description;
      document.getElementById('r-temp').textContent     = Math.round(data.main.temp);
      document.getElementById('r-feels').textContent    = Math.round(data.main.feels_like);
      document.getElementById('r-humidity').textContent = data.main.humidity;
      document.getElementById('r-wind').textContent     = Math.round(data.wind.speed * 10) / 10;
      document.getElementById('r-icon').innerHTML       = getIcon(data.weather[0].id);
      document.getElementById('r-url').textContent      = `GET /data/2.5/weather?q=${city}&units=metric`;

      result.classList.remove('hidden');
    } catch (e) {
      loader.classList.add('hidden');
      error.classList.remove('hidden');
      error.textContent = 'Network error — could not reach the API. Check your internet connection.';
    }
  }
</script>
</body>
</html>
